<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fishing Forecast MVP v3</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;margin:0;background:#f4f7fa;color:#17212b;padding:16px}.app{max-width:900px;margin:auto}.card,.slot{background:#fff;border-radius:16px;padding:16px;margin:0 0 14px;box-shadow:0 2px 12px rgba(0,0,0,.08)}h1{margin:0 0 6px}.sub,.small{color:#5d6b78}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px}label{display:block;font-weight:700;margin:10px 0 5px}input,select,button{font:inherit;width:100%;box-sizing:border-box;border-radius:10px;border:1px solid #ccd7e2;padding:11px}button{background:#123c69;color:white;border:0;font-weight:800;margin-top:14px}button.secondary{background:#eef3f8;color:#123c69;border:1px solid #ccd7e2}.error{color:#8a1f1f;font-weight:700}.ok{color:#1b6d2d;font-weight:700}.topline{display:flex;justify-content:space-between;gap:10px}.score{font-size:1.7rem;font-weight:900}.badge{display:inline-block;padding:4px 9px;border-radius:999px;background:#e8f3ea;color:#1b6d2d;font-weight:800}.warn{background:#fff6df;color:#7a4c00}.bad{background:#fde8e8;color:#8a1f1f}.lures{background:#f7fafc;border-radius:10px;padding:10px;margin-top:8px}.why{color:#41505f;margin:8px 0}noscript{display:block;background:#fde8e8;color:#8a1f1f;padding:14px;border-radius:12px;margin:14px 0;font-weight:800}
</style>
</head>
<body>
<div class="app">
<h1>Fishing Forecast</h1>
<div class="sub">v3 diagnostic build. If the line below does not say “App engine loaded,” the viewer/browser is blocking JavaScript.</div>
<noscript>JavaScript is blocked. This app must be opened in Safari/Chrome/Edge as a downloaded HTML file, not only previewed.</noscript>
<div id="engineStatus" class="card error">App engine has not loaded yet.</div>
<div class="card">
<div class="grid">
<div><label>Latitude</label><input id="lat" value="41.5868" inputmode="decimal"></div>
<div><label>Longitude</label><input id="lon" value="-93.6250" inputmode="decimal"></div>
<div><label>Target fish</label><select id="fish"><option value="largemouth_bass">Largemouth bass</option><option value="smallmouth_bass">Smallmouth bass</option><option value="walleye">Walleye</option><option value="crappie">Crappie</option><option value="bluegill">Bluegill</option><option value="catfish">Catfish</option><option value="trout">Trout</option><option value="pike">Northern pike</option></select></div>
<div><label>Water type</label><select id="water"><option value="lake">Lake/reservoir</option><option value="pond">Pond</option><option value="river">River/stream</option></select></div>
</div>
<button id="forecastBtn" onclick="return FF.runForecast();" type="button">Find best fishing windows</button>
<button id="locationBtn" onclick="return FF.useLocation();" class="secondary" type="button">Use my current location</button>
<button onclick="return FF.testButton();" class="secondary" type="button">Test buttons</button>
<div class="small" style="margin-top:10px">Default coordinates are Des Moines, Iowa.</div>
</div>
<div id="status"></div><div id="results"></div>
</div>
<script>
(function(){
function el(id){return document.getElementById(id);} 
var profiles={
 largemouth_bass:{name:'Largemouth bass',temp:[60,82],best:['dawn','dusk'],lures:['Spinnerbait, chatterbait, swim jig, or squarebill around windblown banks and cover.','Topwater popper/walking bait, buzzbait, or weightless soft plastic near shallow cover.','Texas-rig worm, jig, Ned rig, or wacky rig near shade, docks, weeds, and deeper edges.','Slow jerkbait, finesse jig, shaky head, or suspending bait worked slowly.']},
 smallmouth_bass:{name:'Smallmouth bass',temp:[55,75],best:['dawn','dusk'],lures:['Tube, swimbait, spinnerbait, or jerkbait on rocky/windblown structure.','Topwater walking bait, popper, or small swimbait.','Ned rig, drop shot, tube, or finesse jig on rocks and points.','Suspending jerkbait, blade bait, or slow tube.']},
 walleye:{name:'Walleye',temp:[45,70],best:['dawn','dusk','night'],lures:['Jig + minnow/leech, paddle tail, or crankbait on windblown points and breaks.','Shallow crankbait, slip bobber + leech, or jig near rock/sand transitions.','Live bait rig, bottom bouncer, deeper jigging spoon, or crawler harness.','Slow jig + minnow, blade bait, or vertical jig.']},
 crappie:{name:'Crappie',temp:[55,75],best:['morning','evening'],lures:['1/32–1/16 oz jig, small swimbait, or minnow near brush/docks.','Slip bobber + minnow, tube jig, or marabou jig near shallow cover.','Small jig/minnow around shade, deeper brush piles, or bridge pilings.','Tiny jig or minnow fished slowly near suspended schools.']},
 bluegill:{name:'Bluegill',temp:[65,85],best:['morning','evening'],lures:['Small jig, beetle spin, or worm under bobber near weed edges.','Tiny popper, fly, cricket, or worm under bobber shallow.','Wax worm/red worm under bobber near shade and deeper weeds.','Tiny jig or split-shot worm fished slowly.']},
 catfish:{name:'Catfish',temp:[70,88],best:['dusk','night'],lures:['Cut bait, stink bait, shrimp, or chicken liver near current seams/drop-offs.','Cut bait or live bait near flats, channels, or creek mouths.','Fish deeper holes, logjams, or shaded current breaks with cut bait.','Fresh cut bait in deeper slow water.']},
 trout:{name:'Trout',temp:[45,65],best:['morning','evening'],lures:['Small spinner, spoon, nymph, or streamer.','Dry fly, small spinner, or floating bait where legal.','Nymphs, small jigs, or bait in deeper runs and shade.','Midge/nymph, small spoon, slow presentation.']},
 pike:{name:'Northern pike',temp:[45,68],best:['morning','evening'],lures:['Large spinnerbait, spoon, swimbait, or jerkbait over weeds/points.','Topwater, spinnerbait, or shallow jerkbait near weeds.','Big spoon, swimbait, or jerkbait on deeper weed edges.','Slow spoon, dead bait, or suspending jerkbait.']}
};
function phase(d){var lp=2551443,nm=Date.UTC(2000,0,6,18,14,0)/1000,p=((d.getTime()/1000-nm)%lp)/lp;return p<0?p+1:p}
function phaseName(p){if(p<.03||p>.97)return'new moon';if(p<.22)return'waxing crescent';if(p<.28)return'first quarter';if(p<.47)return'waxing gibbous';if(p<.53)return'full moon';if(p<.72)return'waning gibbous';if(p<.78)return'last quarter';return'waning crescent'}
function band(h){if(h>=5&&h<=8)return'dawn';if(h>=18&&h<=21)return'dusk';if(h>=22||h<=4)return'night';if(h>=9&&h<=11)return'morning';if(h>=16&&h<=17)return'evening';return'midday'}
function score(x,i,arr,p,water){var d=new Date(x.time),b=band(d.getHours()),s=45,r=[];if(p.best.indexOf(b)>-1){s+=16;r.push('good '+b+' timing')}else if(b==='morning'||b==='evening'){s+=8;r.push('near prime low-light period')}else if(b==='midday'){s-=6;r.push('midday is usually tougher')}var pr=x.pressure_msl,prev=i>0?arr[i-1].pressure_msl:pr,tr=pr-prev;if(pr>=1008&&pr<=1020){s+=7;r.push('comfortable barometric pressure')}if(tr<-.8&&tr>-4){s+=10;r.push('falling pressure/front approaching')}if(tr>3){s-=8;r.push('rising pressure may slow fish')}if(x.cloud_cover>=45&&x.cloud_cover<=90){s+=8;r.push('helpful cloud cover')}if(x.precipitation_probability>=15&&x.precipitation_probability<=55){s+=4;r.push('light rain chance can help')}if(x.precipitation_probability>75){s-=10;r.push('high rain/storm risk')}if(x.wind_speed_10m>=4&&x.wind_speed_10m<=14){s+=8;r.push('fishable wind')}if(x.wind_speed_10m>20){s-=14;r.push('wind may be too strong')}if(x.temperature_2m>=p.temp[0]&&x.temperature_2m<=p.temp[1]){s+=9;r.push('air temp fits seasonal activity range')}if(x.temperature_2m<p.temp[0]-10||x.temperature_2m>p.temp[1]+10){s-=5;r.push('temperature may reduce activity')}var mp=phase(d);if(mp<.07||mp>.93||(mp>.45&&mp<.55)){s+=5;r.push(phaseName(mp))}else if((mp>.22&&mp<.28)||(mp>.72&&mp<.78)){s+=3;r.push(phaseName(mp))}if(water==='river'&&x.precipitation_probability>60){s-=5;r.push('river may rise/stain after rain')}if(water==='pond'&&x.wind_speed_10m>16){s-=5;r.push('small ponds can get unpleasant in high wind')}x.date=d;x.score=Math.max(0,Math.min(100,Math.round(s)));x.reasons=r.slice(0,5);x.moon=phaseName(mp);x.band=b;return x}
function tactic(slot,p){if(slot.temperature_2m<p.temp[0])return p.lures[3];if(slot.cloud_cover>45&&slot.wind_speed_10m>=6)return p.lures[0];if((slot.band==='dawn'||slot.band==='dusk'||slot.band==='night')&&slot.wind_speed_10m<10)return p.lures[1];return p.lures[2]}
function bucket(s){if(s>=80)return['Excellent','badge'];if(s>=68)return['Good','badge'];if(s>=55)return['Fair','badge warn'];return['Poor','badge bad']}
window.FF={
 testButton:function(){el('status').innerHTML='<div class="card ok">Buttons are working. Now try the forecast button.</div>';return false},
 useLocation:function(){el('status').innerHTML='<div class="card">Requesting location permission…</div>';if(!navigator.geolocation){el('status').innerHTML='<div class="card error">Geolocation is not supported here. Type coordinates manually.</div>';return false}navigator.geolocation.getCurrentPosition(function(pos){el('lat').value=pos.coords.latitude.toFixed(5);el('lon').value=pos.coords.longitude.toFixed(5);el('status').innerHTML='<div class="card ok">Location added. Tap Find best fishing windows.</div>'},function(){el('status').innerHTML='<div class="card error">Location was blocked/unavailable. You can type coordinates manually.</div>'},{enableHighAccuracy:true,timeout:10000,maximumAge:300000});return false},
 runForecast:function(){el('results').innerHTML='';el('status').innerHTML='<div class="card">Loading forecast…</div>';var lat=parseFloat(el('lat').value),lon=parseFloat(el('lon').value),fish=el('fish').value,water=el('water').value,p=profiles[fish];if(!isFinite(lat)||!isFinite(lon)){el('status').innerHTML='<div class="card error">Enter valid latitude and longitude.</div>';return false}var vars='temperature_2m,precipitation_probability,cloud_cover,wind_speed_10m,pressure_msl';var url='https://api.open-meteo.com/v1/forecast?latitude='+encodeURIComponent(lat)+'&longitude='+encodeURIComponent(lon)+'&hourly='+vars+'&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=auto&forecast_days=7';fetch(url).then(function(res){if(!res.ok)throw new Error('Weather request failed');return res.json()}).then(function(data){var rows=[],h=data.hourly;for(var i=0;i<h.time.length;i++){rows.push({time:h.time[i],temperature_2m:h.temperature_2m[i],precipitation_probability:h.precipitation_probability[i]||0,cloud_cover:h.cloud_cover[i]||0,wind_speed_10m:h.wind_speed_10m[i]||0,pressure_msl:h.pressure_msl[i]||1013})}var now=new Date(),scored=[];for(var j=0;j<rows.length;j++){var item=score(rows[j],j,rows,p,water);if(item.date>now)scored.push(item)}scored.sort(function(a,b){return b.score-a.score});scored=scored.slice(0,12);el('status').innerHTML='<div class="card"><strong>'+p.name+'</strong> forecast for '+lat.toFixed(3)+', '+lon.toFixed(3)+'. Showing top 12 windows in next 7 days.</div>';var html='';for(var k=0;k<scored.length;k++){var slot=scored[k],bb=bucket(slot.score),when=slot.date.toLocaleString([], {weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});html+='<div class="slot"><div class="topline"><div><strong>'+when+'</strong><div class="small">'+Math.round(slot.temperature_2m)+'°F · wind '+Math.round(slot.wind_speed_10m)+' mph · clouds '+slot.cloud_cover+'% · rain '+slot.precipitation_probability+'% · pressure '+Math.round(slot.pressure_msl)+' hPa · '+slot.moon+'</div></div><div class="score">'+slot.score+'</div></div><span class="'+bb[1]+'">'+bb[0]+'</span><div class="why"><strong>Why:</strong> '+slot.reasons.join(', ')+'.</div><div class="lures"><strong>Suggested approach:</strong> '+tactic(slot,p)+'</div></div>'}el('results').innerHTML=html}).catch(function(e){el('status').innerHTML='<div class="card error">Could not load forecast. This may happen if the preview blocks internet access. Try opening the downloaded file in Safari/Chrome. '+e.message+'</div>'});return false}
};
el('engineStatus').className='card ok';el('engineStatus').innerHTML='App engine loaded. Buttons should respond.';
})();
</script>
</body>
</html>
